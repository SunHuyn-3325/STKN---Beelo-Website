<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeeLo Typing Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#fef9f0}

/* ── Shared screen shell ── */
.screen{
  position:fixed;inset:0;display:none;
  background-size:cover;background-position:center;background-repeat:no-repeat;
}
.screen.active{display:block}

/* ========================================
   SCREEN 1 — MAIN SCREEN
   bg: Main_screen.png (1536×1024 landscape)
   "START GAME >" button sits bottom-center
   ======================================== */
#s-main{ background-image:url('../cdn.shopify.com/s/game_img/Main\ screen.png'); }

.btn-start{
  position:absolute;
  /* centre horizontally, ~80% down */
  left:50%; transform:translateX(-50%);
  bottom:10%;
  background:linear-gradient(135deg,#FF9800,#FFC107);
  color:#fff;
  border:none;border-radius:60px;
  padding:clamp(14px,2.5vw,22px) clamp(48px,8vw,90px);
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(1.1rem,2.4vw,1.7rem);
  letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 8px 28px rgba(255,152,0,.5),inset 0 1px 0 rgba(255,255,255,.35);
  transition:transform .2s,box-shadow .2s;
  white-space:nowrap;
}
.btn-start:hover{transform:translateX(-50%) translateY(-4px);box-shadow:0 14px 36px rgba(255,152,0,.6)}

/* ========================================
   SCREEN 2 — GAME
   bg: Game.png
   Layout based on image analysis:
     - BeeLo logo top-left, gear+close top-right (already in bg)
     - Timer pill  → overlay centered-top (~12% from top)
     - Progress bar → ~22% from top
     - White reading card → 28% from top, 18% from left, width ~68%, height ~52%
     - Input field → ~84% from top, 18% from left, width ~64%
     - Words Typed box → bottom-right corner
   ======================================== */
#s-game{ background-image:url('../cdn.shopify.com/s/game_img/Game.png'); }

/* timer */
.timer-pill{
  position:absolute;
  left:50%;top:7%;transform:translateX(-50%);
  background:#FFF4D6;border:2.5px solid #FFD54A;border-radius:60px;
  padding:10px 32px;
  font-family:'Fredoka One',sans-serif;font-size:clamp(1.3rem,2.8vw,2rem);
  color:#5B4528;
  box-shadow:0 4px 16px rgba(255,213,74,.3);
  white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}

/* progress */
.progress-wrap{
  position:absolute;
  left:18%;top:21%;width:65%;
}
.progress-label{
  font-family:'Nunito',sans-serif;font-size:clamp(.7rem,1.3vw,.95rem);
  font-weight:800;color:#5B4528;margin-bottom:5px;
  display:flex;align-items:center;gap:4px;
}
.progress-bar{
  height:14px;background:#EAEAEA;border-radius:20px;overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.07);
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#FFB300,#FFD54A,#FFE68A);
  border-radius:20px;transition:width .35s ease;
}

/* reading card overlay */
.reading-card{
  position:absolute;
  left:17%; top:28%; width:67%; height:50%;
  background:rgba(255,255,255,.88);
  border:2px dashed #FFD6E7;border-radius:20px;
  padding:20px 22px;
  overflow-y:auto;
  font-family:'Nunito',sans-serif;
  font-size:clamp(.85rem,1.5vw,1.1rem);
  line-height:1.9;
  color:#B8B8B8;
  word-break:break-word;
}
.reading-card::-webkit-scrollbar{width:6px}
.reading-card::-webkit-scrollbar-thumb{background:#FFD54A;border-radius:4px}

/* word states */
.word{display:inline}
.word.correct{
  background:linear-gradient(90deg,#FF8A65,#FFD54A,#9CCC65,#64B5F6,#BA68C8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-weight:900;
}
.word.current{
  background:#FFF4B0;color:#5B4528;
  -webkit-text-fill-color:#5B4528;
  border-radius:8px;padding:1px 6px;font-weight:800;
  animation:pulse 1.4s ease-in-out infinite;
}
.word.wrong{
  color:#FF6B6B;-webkit-text-fill-color:#FF6B6B;
  background:#FFE5E5;border-radius:4px;padding:1px 4px;font-weight:800;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}

/* typing input */
.typing-input{
  position:absolute;
  left:17%;bottom:9%;width:64%;
  background:#fff;border:2.5px solid #FFD54A;border-radius:20px;
  padding:clamp(12px,1.8vw,18px) clamp(14px,2vw,22px);
  font-family:'Nunito',sans-serif;font-size:clamp(.9rem,1.6vw,1.1rem);
  color:#5B4528;outline:none;
  box-shadow:0 4px 16px rgba(255,213,74,.2);
  transition:border-color .2s,box-shadow .2s;
}
.typing-input::placeholder{color:#ccc}
.typing-input:focus{border-color:#FF9800;box-shadow:0 0 0 3px rgba(255,152,0,.15)}
.typing-input.error{border-color:#FF6B6B;box-shadow:0 0 0 3px rgba(255,107,107,.15);background:#FFF5F5}

/* words-typed counter box (bottom-right) */
.words-typed-box{
  position:absolute;
  right:3.5%;bottom:7%;
  background:#FEF5E8;border:2px solid #FFD54A;border-radius:16px;
  padding:10px 14px;text-align:center;min-width:90px;
  box-shadow:0 4px 14px rgba(255,213,74,.25);
}
.words-typed-label{
  font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;
  color:#5B4528;text-transform:uppercase;line-height:1.3;
}
.words-typed-num{
  font-family:'Fredoka One',sans-serif;font-size:2rem;
  background:linear-gradient(135deg,#FF8A65,#BA68C8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;
}

/* ========================================
   SCREEN 3 — RESULT
   bg: Result.png
   "Great Job!" banner already in bg image
   Overlay: score number inside the cream box (~55%-77% from top)
   Button "Hãy nhận quà ngay" near bottom
   ======================================== */
#s-result{ background-image:url('Result.png'); }

/* score number inside the pale yellow box in the card */
.result-score-overlay{
  position:absolute;
  left:50%;top:54%;transform:translateX(-50%);
  text-align:center;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(2.6rem,5.5vw,4rem);
  background:linear-gradient(135deg,#FF8A65,#9CCC65);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.result-words-label{
  font-family:'Nunito',sans-serif;
  font-size:clamp(.8rem,1.4vw,1rem);
  font-weight:800;color:#5B4528;
  -webkit-text-fill-color:#5B4528;
  margin-top:6px;
}

.btn-claim{
  position:absolute;
  left:50%;bottom:13%;transform:translateX(-50%);
  background:linear-gradient(135deg,#FF9800,#FFC107);
  color:#fff;border:none;border-radius:60px;
  padding:clamp(12px,2vw,18px) clamp(36px,6vw,72px);
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(1rem,2vw,1.4rem);
  cursor:pointer;white-space:nowrap;
  box-shadow:0 8px 24px rgba(255,152,0,.45);
  transition:transform .2s,box-shadow .2s;
  display:flex;align-items:center;gap:8px;
}
.btn-claim:hover{transform:translateX(-50%) translateY(-4px)}

/* ========================================
   SCREEN 4 — GIFT (1, 2, 3)
   bg: Gift_1.png / Gift_2.png / Gift_3.png
   Right half has white dashed form panel
   Overlay the form fields + button into the right panel
   Right panel starts ~47% from left, top ~5%, width ~51%, height ~90%
   ======================================== */
#s-gift{ background-image:url('../cdn.shopify.com/s/game_img/Gift\ 1.png'); }/* updated by JS */

.gift-form-panel{
  position:absolute;
  left:47%; top:5%; width:51%; height:90%;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:0 4% 4% 3%;
  gap:0;
}

/* subtitle already in bg; just render inputs */
.form-fields{
  display:flex;flex-direction:column;gap:clamp(6px,1.2vh,12px);
  flex:1;justify-content:center;
  padding-top:clamp(60px,14%,130px);/* push below bg text */
}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{
  font-family:'Nunito',sans-serif;font-size:clamp(.78rem,1.3vw,.95rem);
  font-weight:800;color:#5B4528;
  display:flex;align-items:center;gap:6px;
}
.form-input{
  background:#f9f7f3;border:2px solid #e8e0d0;border-radius:14px;
  padding:clamp(9px,1.4vh,14px) clamp(10px,1.5vw,16px);
  font-family:'Nunito',sans-serif;font-size:clamp(.82rem,1.3vw,.95rem);
  color:#5B4528;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.form-input:focus{border-color:#FFD54A;box-shadow:0 3px 10px rgba(255,213,74,.25)}
.form-input::placeholder{color:#bbb}
textarea.form-input{resize:none;height:clamp(52px,8vh,76px);}

.btn-hoan-tat{
  margin-top:clamp(8px,1.5vh,16px);
  background:linear-gradient(135deg,#FF9800,#FFC107);
  color:#fff;border:none;border-radius:60px;
  padding:clamp(12px,2vh,18px) 0;width:100%;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(1rem,2vw,1.35rem);letter-spacing:.5px;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(255,152,0,.4);
  transition:transform .2s,box-shadow .2s;
}
.btn-hoan-tat:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(255,152,0,.5)}

/* ========================================
   SCREEN 5 — FINISH
   bg: Finish.png
   Two buttons: "PLAY AGAIN" (orange) + "RETURN HOMEPAGE" (blue)
   They appear near bottom ~82% from top, side by side
   ======================================== */
#s-finish{ background-image:url('../cdn.shopify.com/s/game_img/Finish.png'); }

.finish-buttons{
  position:absolute;
  left:50%;bottom:10%;transform:translateX(-50%);
  display:flex;gap:clamp(10px,2vw,24px);
  align-items:center;
}
.btn-play-again,.btn-home-btn{
  border:none;border-radius:60px;
  padding:clamp(12px,2vw,18px) clamp(24px,4vw,52px);
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.95rem,1.8vw,1.3rem);
  letter-spacing:.5px;cursor:pointer;white-space:nowrap;
  transition:transform .2s,box-shadow .2s;
  display:flex;align-items:center;gap:8px;
}
.btn-play-again{
  background:linear-gradient(135deg,#FF9800,#FFC107);color:#fff;
  box-shadow:0 8px 24px rgba(255,152,0,.45);
}
.btn-play-again:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(255,152,0,.55)}
.btn-home-btn{
  background:linear-gradient(135deg,#64B5F6,#2196F3);color:#fff;
  box-shadow:0 8px 24px rgba(33,150,243,.4);
}
.btn-home-btn:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(33,150,243,.5)}
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     SCREEN 1 — MAIN
════════════════════════════════════════ -->
<div id="s-main" class="screen active">
  <button class="btn-start" onclick="startGame()">START GAME &nbsp;›</button>
</div>


<!-- ════════════════════════════════════════
     SCREEN 2 — GAME
════════════════════════════════════════ -->
<div id="s-game" class="screen">

  <!-- Timer -->
  <div class="timer-pill">⏰&nbsp;<span id="timer-display">01:00</span></div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">⭐&nbsp;<span id="progress-text">0 / 0 words completed</span></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Reading passage card -->
  <div class="reading-card" id="reading-area"></div>

  <!-- Typing input -->
  <input
    type="text" id="game-input" class="typing-input"
    placeholder="Start typing here…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  >

  <!-- Words Typed counter (bottom-right) -->
  <div class="words-typed-box">
    <div class="words-typed-label">Words<br>Typed</div>
    <div class="words-typed-num" id="counter-value">0</div>
  </div>

  <!-- Settings / close (just back-to-main) -->
  <button onclick="backToMain()" style="
    position:absolute;top:3%;right:2%;
    background:rgba(255,255,255,.85);border:none;border-radius:50%;
    width:clamp(36px,4vw,54px);height:clamp(36px,4vw,54px);
    font-size:1.3rem;cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
    display:flex;align-items:center;justify-content:center;
  " title="Exit">✕</button>
</div>


<!-- ════════════════════════════════════════
     SCREEN 3 — RESULT
════════════════════════════════════════ -->
<div id="s-result" class="screen">
  <!-- Score overlay inside the pale box in the card -->
  <div class="result-score-overlay">
    <div id="result-number" style="font-size:inherit">0</div>
    <div class="result-words-label">từ chính xác</div>
  </div>

  <!-- CTA button -->
  <button class="btn-claim" id="btn-claim" onclick="showGiftScreen()">
    Hãy nhận quà ngay &nbsp;›
  </button>
</div>


<!-- ════════════════════════════════════════
     SCREEN 4 — GIFT
════════════════════════════════════════ -->
<div id="s-gift" class="screen">
  <div class="gift-form-panel">
    <div class="form-fields">
      <div class="form-group">
        <label class="form-label">👤 Họ và tên</label>
        <input type="text" id="form-name" class="form-input" placeholder="Nhập họ và tên của bạn" required>
      </div>
      <div class="form-group">
        <label class="form-label">✉️ Email</label>
        <input type="email" id="form-email" class="form-input" placeholder="Nhập email của bạn" required>
      </div>
      <div class="form-group">
        <label class="form-label">📱 Số điện thoại</label>
        <input type="tel" id="form-phone" class="form-input" placeholder="Nhập số điện thoại của bạn">
      </div>
      <div class="form-group">
        <label class="form-label">💬 Câu hỏi hoặc ghi chú khác</label>
        <textarea id="form-note" class="form-input" placeholder="Nhập câu hỏi hoặc ghi chú của bạn"></textarea>
      </div>
    </div>
    <button class="btn-hoan-tat" onclick="submitGift()">HOÀN TẤT &nbsp;›</button>
  </div>
</div>


<!-- ════════════════════════════════════════
     SCREEN 5 — FINISH
════════════════════════════════════════ -->
<div id="s-finish" class="screen">
  <div class="finish-buttons">
    <button class="btn-play-again" onclick="backToMain()">↻&nbsp; PLAY AGAIN</button>
    <button class="btn-home-btn" onclick="goHome()">🏠&nbsp; VỀ TRANG CHỦ</button>
  </div>
</div>


<script>
/* ─── Data ─── */
const PARAGRAPHS=[
  "Every morning, Beelo the little bee wakes up early to begin a brand-new day full of adventure and learning. Beelo loves flying around the garden, visiting colorful flowers, and meeting friendly animals along the way. As Beelo explores nature, he discovers new things about plants, trees, and the world around him. He believes that every day is a wonderful opportunity to learn, create, and grow. Whether it is trying something new, helping a friend, or practicing an important skill, Beelo always gives his best effort. He knows that with patience, determination, and a positive attitude, anyone can achieve great things and turn small dreams into amazing accomplishments.",
  "One sunny day, Beelo and his rainbow friends set out on a magical journey to collect colors from around the world. They traveled across green fields, sparkling rivers, and beautiful forests filled with singing birds. Along the way, they faced exciting challenges that taught them about friendship, teamwork, and courage. Whenever they encountered a problem, they worked together to find a solution and encouraged one another to keep going. As they continued their adventure, they gathered bright colors from every place they visited. By the end of the journey, they had collected enough colors to create a magnificent rainbow that brought joy and happiness to children everywhere.",
  "Today is the biggest creative festival of the year, and Beelo is excited to welcome children from all over the world. The festival is filled with fun activities such as drawing, coloring, storytelling, and creating wonderful art projects. Every child brings unique ideas and imagination to share with others. Some children draw beautiful forests, while others create colorful oceans, magical castles, or even planets in outer space. Beelo encourages everyone to express themselves freely because every idea is valuable and special. Throughout the day, children learn that creativity grows when they are confident, curious, and willing to try new things. By the end of the festival, everyone leaves with happy memories, new friends, and inspiration to continue exploring their creativity every day."
];

/* ─── State ─── */
let state={
  words:[],idx:0,correct:0,
  timeLeft:60,active:false,timer:null
};

/* ─── Screens ─── */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function backToMain(){
  state.active=false;clearInterval(state.timer);
  document.getElementById('game-input').value='';
  document.getElementById('game-input').classList.remove('error');
  show('s-main');
}

function goHome(){ window.location.href='index.html'; }

/* ─── Start game ─── */
function startGame(){
  const para=PARAGRAPHS[Math.floor(Math.random()*PARAGRAPHS.length)];
  state.words=para.split(/\s+/);
  state.idx=0; state.correct=0;
  state.timeLeft=60; state.active=true;

  renderPassage(); updateCounter(0); updateProgress(); updateTimerUI();
  show('s-game');
  document.getElementById('game-input').focus();

  state.timer=setInterval(()=>{
    state.timeLeft--;
    updateTimerUI();
    if(state.timeLeft<=0) endGame();
  },1000);
}

/* ─── Timer ─── */
function updateTimerUI(){
  const m=String(Math.floor(state.timeLeft/60)).padStart(2,'0');
  const s=String(state.timeLeft%60).padStart(2,'0');
  document.getElementById('timer-display').textContent=`${m}:${s}`;
}

/* ─── Progress ─── */
function updateProgress(){
  const pct=state.words.length?Math.round(state.idx/state.words.length*100):0;
  document.getElementById('progress-text').textContent=`${state.idx} / ${state.words.length} words completed`;
  document.getElementById('progress-fill').style.width=pct+'%';
}

/* ─── Render passage ─── */
function renderPassage(){
  const area=document.getElementById('reading-area');
  area.innerHTML=state.words.map((w,i)=>{
    let cls='word';
    if(i<state.idx) cls+=' correct';
    else if(i===state.idx) cls+=' current';
    return `<span class="${cls}">${w}</span>`;
  }).join(' ');
  const cur=area.querySelector('.current');
  if(cur) cur.scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* ─── Counter ─── */
function updateCounter(n){
  document.getElementById('counter-value').textContent=n;
}

/* ─── Submit word ─── */
function submitWord(typed){
  if(!typed||state.idx>=state.words.length) return;
  const target=state.words[state.idx];
  if(typed.toLowerCase()===target.toLowerCase()){
    state.correct++;
    updateCounter(state.correct);
  }
  state.idx++;
  updateProgress(); renderPassage();
  const inp=document.getElementById('game-input');
  inp.value=''; inp.classList.remove('error'); inp.focus();
  if(state.idx>=state.words.length) endGame();
}

/* ─── End game ─── */
function endGame(){
  state.active=false; clearInterval(state.timer);
  document.getElementById('result-number').textContent=state.correct;
  show('s-result');
}

/* ─── Gift screen ─── */
function showGiftScreen(){
  const n=state.correct;
  let bg='../cdn.shopify.com/s/game_img/Gift\ 1.png';
  if(n>=90) bg='../cdn.shopify.com/s/game_img/Gift\ 3.png';
  else if(n>=60) bg='../cdn.shopify.com/s/game_img/Gift\ 2.png';
  document.getElementById('s-gift').style.backgroundImage=`url('${bg}')`;
  // clear form
  ['form-name','form-email','form-phone','form-note'].forEach(id=>{
    document.getElementById(id).value='';
  });
  show('s-gift');
}

/* ─── Submit gift form ─── */
function submitGift(){
  const name=document.getElementById('form-name').value.trim();
  const email=document.getElementById('form-email').value.trim();
  if(!name||!email){
    alert('Vui lòng điền đầy đủ họ tên và email!');
    return;
  }
  show('s-finish');
}

/* ─── Input events ─── */
document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('game-input');

  inp.addEventListener('keydown',e=>{
    if(!state.active) return;
    if(e.key===' '||e.key==='Enter'){
      e.preventDefault();
      submitWord(inp.value.trim());
    }
  });

  inp.addEventListener('input',()=>{
    if(!state.active) return;
    const typed=inp.value.trim();
    const target=state.words[state.idx]||'';
    if(typed&&!target.toLowerCase().startsWith(typed.toLowerCase()))
      inp.classList.add('error');
    else inp.classList.remove('error');
  });
});
</script>
</body>
</html>
