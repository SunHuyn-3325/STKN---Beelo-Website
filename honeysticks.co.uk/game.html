<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeeLo Typing Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* Letterbox container — warm cream matches the game backgrounds */
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#f0e5cc;
  display:flex;align-items:center;justify-content:center;
}

/* ── 3:2 Stage — all screens positioned relative to this ── */
/* On 16:9 screens: height fills viewport, narrow bars on sides */
/* On 4:3 screens : width fills viewport, thin bars top/bottom */
#stage{
  position:relative;
  width:min(100vw, calc(100vh * 1.5));
  height:min(100vh, calc(100vw / 1.5));
  overflow:hidden;
  flex-shrink:0;
}

/* ── Shared screen shell ── */
/* background-size:100% 100% stretches to fill exactly — no crop since
   the stage is always 3:2 matching the 1536×1024 PNGs               */
.screen{
  position:absolute;inset:0;
  display:none;
  background-size:100% 100%;
  background-repeat:no-repeat;
}
.screen.active{display:block}


/* ════════════════════════════════════════════════════════
   SCREEN 1 — MAIN  (Main screen.png)
   All text / artwork is baked into the PNG.
   Overlay: one START GAME button at bottom-centre.
   ════════════════════════════════════════════════════════ */
#s-main{background-image:url('game-assets/Main%20screen.png');}

.btn-start{
  position:absolute;
  left:50%;bottom:8%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#FF9800,#FFC107);
  color:#fff;border:none;border-radius:60px;
  padding:.9% 6%;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.9rem,2.1vw,1.55rem);
  letter-spacing:1px;cursor:pointer;white-space:nowrap;
  box-shadow:0 6px 22px rgba(255,152,0,.5),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .18s,box-shadow .18s;
}
.btn-start:hover{
  transform:translateX(-50%) translateY(-3px);
  box-shadow:0 12px 30px rgba(255,152,0,.6);
}


/* ════════════════════════════════════════════════════════
   SCREEN 2 — GAME  (Game.png)
   PNG contains: card frame (15 – 89 % W, 19 – 83 % H),
                 input bar  (15.5 – 74 % W, 86 – 91.5 % H),
                 counter box(77 – 88 % W, 86 – 94 % H),
                 BeeLo logo, bee, rainbow, gear ⚙, ✕ icon.
   Overlays are TRANSPARENT to reveal the PNG chrome beneath.
   ════════════════════════════════════════════════════════ */
#s-game{background-image:url('game-assets/Game.png');}

/* Timer pill — visible overlay, floats in the empty centre-top zone */
.timer-pill{
  position:absolute;
  left:50%;top:1.5%;
  transform:translateX(-50%);
  background:#FFF4D6;border:2.5px solid #FFD54A;border-radius:60px;
  padding:.45% 2.2%;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.9rem,2.3vw,1.65rem);
  color:#5B4528;
  box-shadow:0 3px 12px rgba(255,213,74,.35);
  white-space:nowrap;
  display:flex;align-items:center;gap:.4em;
  z-index:2;
}

/* Reading card — transparent, sits perfectly inside the dashed white card */
/* Card in PNG: left≈15.1%, top≈19%, width≈73.6%, height≈63.7% */
.reading-card{
  position:absolute;
  left:16%;top:20%;width:72%;height:62%;
  background:transparent;border:none;
  padding:1.2% 2%;
  overflow-y:auto;
  font-family:'Nunito',sans-serif;
  font-size:clamp(.7rem,1.35vw,1rem);
  line-height:1.95;
  color:#555;
  word-break:break-word;
}
.reading-card::-webkit-scrollbar{width:5px}
.reading-card::-webkit-scrollbar-thumb{background:#FFD54A80;border-radius:4px}

/* Word states */
.word{display:inline}
.word.correct{
  background:linear-gradient(90deg,#FF8A65,#FFD54A,#9CCC65,#64B5F6,#BA68C8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-weight:900;
}
.word.current{
  background:#FFF4B0;color:#5B4528;
  -webkit-text-fill-color:#5B4528;
  border-radius:6px;padding:1px 5px;font-weight:800;
  animation:pulse 1.4s ease-in-out infinite;
}
.word.wrong{
  color:#FF6B6B;-webkit-text-fill-color:#FF6B6B;
  background:#FFE5E5;border-radius:4px;padding:1px 4px;font-weight:800;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Typing input — transparent, overlays the yellow input bar in the PNG */
/* Bar in PNG: left≈15.1%, top≈85.6%, width≈58.9%, height≈5.9% */
.typing-input{
  position:absolute;
  left:15.5%;top:86%;width:58.5%;height:5.5%;
  background:transparent;border:none;outline:none;
  padding:.3% 2%;
  font-family:'Nunito',sans-serif;
  font-size:clamp(.8rem,1.45vw,1.05rem);
  color:#5B4528;font-weight:700;
  caret-color:#FF9800;
}
.typing-input::placeholder{color:#c8b898}
.typing-input.error{background:rgba(255,107,107,.08)}

/* Words-typed number — floats inside the small counter box in the PNG */
/* Box in PNG: left≈76.4%, top≈85.6%, width≈11.3%, height≈8.5% */
.words-typed-num{
  position:absolute;
  left:77%;top:86%;
  width:11%;height:9%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(1.1rem,2.8vw,2.2rem);
  background:linear-gradient(135deg,#FF8A65,#BA68C8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}

/* Invisible close-button hotspot — covers the ✕ drawn in the PNG */
/* ✕ icon in PNG: right≈6.7%, top≈2.2%, width≈4.7%, height≈6.9% */
.btn-close-hotspot{
  position:absolute;
  right:6%;top:2%;
  width:5%;height:7%;
  background:transparent;border:none;cursor:pointer;
  border-radius:50%;
  z-index:3;
}


/* ════════════════════════════════════════════════════════
   SCREEN 3 — RESULT  (Result.png)
   PNG contains: Great Job! banner, "Bạn đã gõ được:" text,
                 empty white score box, empty orange CTA bar.
   Overlays: score number + claim button (transparent hotspot
             on orange bar) / retry button (visible, replaces).
   ════════════════════════════════════════════════════════ */
#s-result{background-image:url('game-assets/Result.png');}

/* Score number — renders inside the white score box in the PNG */
/* Score box in PNG: left≈18.9%, top≈52%, width≈63%, height≈19.7% */
.result-score-num{
  position:absolute;
  left:19%;top:52%;width:63%;height:20%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2%;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(1.8rem,4.8vw,3.6rem);
  background:linear-gradient(135deg,#FF8A65,#9CCC65);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1;
}
.result-score-sub{
  font-family:'Nunito',sans-serif;
  font-size:clamp(.6rem,1vw,.85rem);
  font-weight:800;color:#5B4528;
  -webkit-text-fill-color:#5B4528;
}

/* Claim button — transparent hotspot on the orange bar in Result.png */
/* Orange bar in PNG: left≈19%, top≈76.1%, width≈63%, height≈9.3% */
.btn-claim{
  position:absolute;
  left:19%;top:76%;width:63%;height:9%;
  background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.4em;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.85rem,1.7vw,1.3rem);
  color:#fff;
  z-index:2;
}
.btn-claim.hidden{display:none}

/* Retry button — replaces claim when score < 30, rendered visibly */
.btn-retry{
  position:absolute;
  left:19%;top:76%;width:63%;height:9%;
  background:linear-gradient(135deg,#64B5F6,#2196F3);
  border:none;border-radius:60px;cursor:pointer;
  display:none;align-items:center;justify-content:center;gap:.4em;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.85rem,1.7vw,1.3rem);
  color:#fff;
  box-shadow:0 6px 20px rgba(33,150,243,.4);
  transition:transform .18s;
}
.btn-retry.visible{display:flex}
.btn-retry:hover{transform:translateY(-2px)}


/* ════════════════════════════════════════════════════════
   SCREEN 4 — GIFT  (Gift 1 / 2 / 3.png)
   PNG contains: left-side prize artwork, right dashed panel,
                 "Nhận quà từ BeeLo" title, subtitle text.
   Form fields overlay the empty lower portion of right panel.
   Right panel: x ≈ 780–1530 → left: 50.8 %
   Form starts below subtitle ≈ top 24 %
   ════════════════════════════════════════════════════════ */
#s-gift{background-image:url('game-assets/Gift%201.png');}

/* Form starts below subtitle in PNG (subtitle ends ≈ 36.6%) */
.gift-form-panel{
  position:absolute;
  left:51%;top:37%;
  width:46%;height:57%;
  display:flex;flex-direction:column;
  padding:0 2.5% 2.5% 2%;
  gap:.8%;
}
.form-group{
  display:flex;flex-direction:column;
  gap:.3%;flex:1;min-height:0;
}
.form-label{
  font-family:'Nunito',sans-serif;
  font-size:clamp(.6rem,1vw,.82rem);
  font-weight:800;color:#5B4528;
  display:flex;align-items:center;gap:.4em;
  flex-shrink:0;margin-bottom:.2%;
}
.form-input{
  background:rgba(255,255,255,.82);
  border:1.5px solid #ddd4be;border-radius:10px;
  padding:.5% 1.5%;
  font-family:'Nunito',sans-serif;
  font-size:clamp(.62rem,1vw,.82rem);
  color:#5B4528;outline:none;
  transition:border-color .2s,box-shadow .2s;
  flex:1;min-height:0;
}
.form-input:focus{
  border-color:#FFD54A;
  box-shadow:0 2px 8px rgba(255,213,74,.25);
}
.form-input::placeholder{color:#c0b09a}
textarea.form-input{resize:none}

.btn-hoan-tat{
  margin-top:.8%;
  background:linear-gradient(135deg,#FF9800,#FFC107);
  color:#fff;border:none;border-radius:60px;
  padding:clamp(7px,1.4vh,13px) 0;width:100%;
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.85rem,1.65vw,1.25rem);
  letter-spacing:.5px;cursor:pointer;
  box-shadow:0 5px 18px rgba(255,152,0,.4);
  transition:transform .18s,box-shadow .18s;
  flex-shrink:0;
}
.btn-hoan-tat:hover{
  transform:translateY(-2px);
  box-shadow:0 9px 24px rgba(255,152,0,.5);
}


/* ════════════════════════════════════════════════════════
   SCREEN 5 — FINISH  (Finish.png)
   PNG contains: full thank-you card with all text.
   Overlay: PLAY AGAIN + VỀ TRANG CHỦ buttons at bottom.
   ════════════════════════════════════════════════════════ */
#s-finish{background-image:url('game-assets/Finish.png');}

.finish-buttons{
  position:absolute;
  left:50%;bottom:5%;
  transform:translateX(-50%);
  display:flex;gap:2vw;
  align-items:center;
}
.btn-play-again,.btn-home-btn{
  border:none;border-radius:60px;
  padding:clamp(9px,1.6vw,15px) clamp(18px,3.2vw,44px);
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(.8rem,1.5vw,1.15rem);
  letter-spacing:.5px;cursor:pointer;white-space:nowrap;
  transition:transform .18s,box-shadow .18s;
  display:flex;align-items:center;gap:.4em;
}
.btn-play-again{
  background:linear-gradient(135deg,#FF9800,#FFC107);color:#fff;
  box-shadow:0 6px 20px rgba(255,152,0,.45);
}
.btn-play-again:hover{transform:translateY(-3px)}
.btn-home-btn{
  background:linear-gradient(135deg,#64B5F6,#2196F3);color:#fff;
  box-shadow:0 6px 20px rgba(33,150,243,.4);
}
.btn-home-btn:hover{transform:translateY(-3px)}
</style>
</head>
<body>

<div id="stage">

<!-- ════ SCREEN 1 — MAIN ════ -->
<div id="s-main" class="screen active">
  <button class="btn-start" onclick="startGame()">START GAME &nbsp;›</button>
</div>


<!-- ════ SCREEN 2 — GAME ════ -->
<div id="s-game" class="screen">
  <!-- Timer: visible overlay in the empty center-top strip -->
  <div class="timer-pill">⏰&nbsp;<span id="timer-display">01:00</span></div>

  <!-- Reading passage: transparent overlay inside the white card in PNG -->
  <div class="reading-card" id="reading-area"></div>

  <!-- Typing input: transparent, overlays the yellow input bar in PNG -->
  <input
    type="text" id="game-input" class="typing-input"
    placeholder="Gõ từng chữ vào đây, nhấn Space để tiếp…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  >

  <!-- Words-typed counter: overlays the small box in PNG -->
  <div class="words-typed-num" id="counter-value">0</div>

  <!-- Invisible hotspot covering the ✕ icon drawn in Game.png -->
  <button class="btn-close-hotspot" onclick="backToMain()" title="Thoát"></button>
</div>


<!-- ════ SCREEN 3 — RESULT ════ -->
<div id="s-result" class="screen">
  <!-- Score number: rendered inside the white score box in Result.png -->
  <div class="result-score-num">
    <span id="result-number">0</span>
    <span class="result-score-sub">từ chính xác</span>
  </div>

  <!-- Claim button: transparent hotspot over the orange bar in Result.png -->
  <button class="btn-claim" id="btn-claim" onclick="showGiftScreen()">
    Hãy nhận quà ngay &nbsp;›
  </button>

  <!-- Retry button (< 30 words): replaces claim button with a visible blue button -->
  <button class="btn-retry" id="btn-retry" onclick="backToMain()">
    ↻&nbsp; THỬ LẠI
  </button>
</div>


<!-- ════ SCREEN 4 — GIFT ════ -->
<div id="s-gift" class="screen">
  <div class="gift-form-panel">
    <div class="form-group">
      <label class="form-label">👤 Họ và tên</label>
      <input type="text" id="form-name" class="form-input"
             placeholder="Nhập họ và tên của bạn" required>
    </div>
    <div class="form-group">
      <label class="form-label">✉️ Email</label>
      <input type="email" id="form-email" class="form-input"
             placeholder="Nhập email của bạn" required>
    </div>
    <div class="form-group">
      <label class="form-label">📱 Số điện thoại</label>
      <input type="tel" id="form-phone" class="form-input"
             placeholder="Nhập số điện thoại">
    </div>
    <div class="form-group" style="flex:1.5">
      <label class="form-label">💬 Ghi chú</label>
      <textarea id="form-note" class="form-input"
                placeholder="Câu hỏi hoặc ghi chú của bạn…"></textarea>
    </div>
    <button class="btn-hoan-tat" onclick="submitGift()">HOÀN TẤT &nbsp;›</button>
  </div>
</div>


<!-- ════ SCREEN 5 — FINISH ════ -->
<div id="s-finish" class="screen">
  <div class="finish-buttons">
    <button class="btn-play-again" onclick="backToMain()">↻&nbsp; PLAY AGAIN</button>
    <button class="btn-home-btn"   onclick="goHome()">🏠&nbsp; VỀ TRANG CHỦ</button>
  </div>
</div>

</div><!-- #stage -->


<script>
/* ─── Paragraph pool ─── */
const PARAGRAPHS = [
  "Every morning, Beelo the little bee wakes up early to begin a brand-new day full of adventure and learning. Beelo loves flying around the garden, visiting colorful flowers, and meeting friendly animals along the way. As Beelo explores nature, he discovers new things about plants, trees, and the world around him. He believes that every day is a wonderful opportunity to learn, create, and grow. Whether it is trying something new, helping a friend, or practicing an important skill, Beelo always gives his best effort. He knows that with patience, determination, and a positive attitude, anyone can achieve great things and turn small dreams into amazing accomplishments.",
  "One sunny day, Beelo and his rainbow friends set out on a magical journey to collect colors from around the world. They traveled across green fields, sparkling rivers, and beautiful forests filled with singing birds. Along the way, they faced exciting challenges that taught them about friendship, teamwork, and courage. Whenever they encountered a problem, they worked together to find a solution and encouraged one another to keep going. As they continued their adventure, they gathered bright colors from every place they visited. By the end of the journey, they had collected enough colors to create a magnificent rainbow that brought joy and happiness to children everywhere.",
  "Today is the biggest creative festival of the year, and Beelo is excited to welcome children from all over the world. The festival is filled with fun activities such as drawing, coloring, storytelling, and creating wonderful art projects. Every child brings unique ideas and imagination to share with others. Some children draw beautiful forests, while others create colorful oceans, magical castles, or even planets in outer space. Beelo encourages everyone to express themselves freely because every idea is valuable and special. Throughout the day, children learn that creativity grows when they are confident, curious, and willing to try new things. By the end of the festival, everyone leaves with happy memories, new friends, and inspiration to continue exploring their creativity every day."
];

/* ─── Game state ─── */
let state = { words:[], idx:0, correct:0, timeLeft:60, active:false, timer:null };

/* ─── Screen helper ─── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function backToMain() {
  state.active = false;
  clearInterval(state.timer);
  const inp = document.getElementById('game-input');
  inp.value = '';
  inp.classList.remove('error');
  show('s-main');
}

function goHome() { window.location.href = 'index.html'; }

/* ─── Start ─── */
function startGame() {
  const para = PARAGRAPHS[Math.floor(Math.random() * PARAGRAPHS.length)];
  state.words   = para.split(/\s+/);
  state.idx     = 0;
  state.correct = 0;
  state.timeLeft= 60;
  state.active  = true;

  renderPassage();
  updateCounter(0);
  updateTimerUI();
  show('s-game');
  document.getElementById('game-input').focus();

  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerUI();
    if (state.timeLeft <= 0) endGame();
  }, 1000);
}

/* ─── Timer ─── */
function updateTimerUI() {
  const m = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
  const s = String(state.timeLeft % 60).padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}

/* ─── Passage renderer ─── */
function renderPassage() {
  const area = document.getElementById('reading-area');
  area.innerHTML = state.words.map((w, i) => {
    let cls = 'word';
    if      (i < state.idx)  cls += ' correct';
    else if (i === state.idx) cls += ' current';
    return `<span class="${cls}">${w}</span>`;
  }).join(' ');
  const cur = area.querySelector('.current');
  if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

/* ─── Counter ─── */
function updateCounter(n) {
  document.getElementById('counter-value').textContent = n;
}

/* ─── Submit word (Space / Enter) ─── */
function submitWord(typed) {
  if (!typed || state.idx >= state.words.length) return;
  if (typed.toLowerCase() === state.words[state.idx].toLowerCase()) {
    state.correct++;
    updateCounter(state.correct);
  }
  state.idx++;
  renderPassage();
  const inp = document.getElementById('game-input');
  inp.value = '';
  inp.classList.remove('error');
  inp.focus();
  if (state.idx >= state.words.length) endGame();
}

/* ─── End game ─── */
function endGame() {
  state.active = false;
  clearInterval(state.timer);
  document.getElementById('result-number').textContent = state.correct;

  const claimBtn = document.getElementById('btn-claim');
  const retryBtn = document.getElementById('btn-retry');
  if (state.correct >= 30) {
    claimBtn.classList.remove('hidden');
    retryBtn.classList.remove('visible');
  } else {
    claimBtn.classList.add('hidden');
    retryBtn.classList.add('visible');
  }
  show('s-result');
}

/* ─── Gift screen ─── */
function showGiftScreen() {
  const n = state.correct;
  let bg = 'game-assets/Gift%201.png';
  if      (n >= 90) bg = 'game-assets/Gift%203.png';
  else if (n >= 60) bg = 'game-assets/Gift%202.png';
  document.getElementById('s-gift').style.backgroundImage = `url('${bg}')`;
  ['form-name','form-email','form-phone','form-note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  show('s-gift');
}

/* ─── Submit gift form ─── */
function submitGift() {
  const name  = document.getElementById('form-name').value.trim();
  const email = document.getElementById('form-email').value.trim();
  if (!name || !email) {
    alert('Vui lòng điền đầy đủ họ tên và email!');
    return;
  }
  show('s-finish');
}

/* ─── Keyboard handling ─── */
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('game-input');

  inp.addEventListener('keydown', e => {
    if (!state.active) return;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      submitWord(inp.value.trim());
    }
  });

  inp.addEventListener('input', () => {
    if (!state.active) return;
    const typed  = inp.value.trim();
    const target = state.words[state.idx] || '';
    if (typed && !target.toLowerCase().startsWith(typed.toLowerCase()))
      inp.classList.add('error');
    else
      inp.classList.remove('error');
  });
});
</script>
</body>
</html>
